name: Publish

on:
  release:
    types:
      - published

jobs:
  publish:
    name: Build and publish to PyPI
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify release tag matches project version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          tag = os.environ["RELEASE_TAG"].strip()
          accepted = {version, f"v{version}"}

          if tag not in accepted:
              raise SystemExit(
                  f"Release tag '{tag}' does not match project version '{version}'. "
                  f"Expected one of: {sorted(accepted)}"
              )

          print(f"Release tag '{tag}' matches project version '{version}'.")
          PY

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check --strict dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
